<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- FIX: Added for mobile sizing -->
    <title>F1 Team Guessing Game</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        body {
            background-color: #E6E6FA; /* Your custom lavender background */
            font-family: Arial, sans-serif;
            color: #222222;
            padding-bottom: 50px;
        }
        
        .quiz-card {
            background-color: white;
            max-width: 600px;
            margin: 30px auto;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .nav-container {
            background-color: #000000;
            padding: 15px;
            margin-bottom: 20px;
        }

        h1 {
            color: #003366; /* Your deep blue heading color */
            font-weight: bold;
        }

        .score-box {
            font-size: 1.25rem;
            font-weight: bold;
            background-color: #F5F5F5;
            padding: 8px 15px;
            border-radius: 20px;
            display: inline-block;
            margin-bottom: 15px;
        }

        .img-container {
            border: 3px solid black; /* Your custom image border rule */
            border-radius: 6px;
            overflow: hidden;
            max-width: 100%;
            height: 250px;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #eee;
            margin: 15px auto;
        }

        .img-container img {
            max-width: 100%;
            max-height: 100%;
            object-fit: cover;
        }

        .team-btn {
            font-size: 1.05rem;
            padding: 12px;
            font-weight: bold;
            transition: transform 0.1s;
        }

        .team-btn:hover {
            transform: translateY(-2px);
        }

        #result {
            font-size: 1.2rem;
            font-weight: bold;
            min-height: 30px;
        }
    </style>
</head>
<body>

    <!-- Black Navigation Bar -->
    <div class="nav-container text-center">
        <a href="index.html" class="btn btn-primary mx-1">Home</a>
        <a href="aboutme.html" class="btn btn-primary mx-1">About Me</a>
        <a href="resume.html" class="btn btn-primary mx-1">Resume</a>
        <a href="scratch.html" class="btn btn-primary mx-1">Formula 1 Page</a>
    </div>

    <!-- Main Quiz App Area -->
    <div class="container">
        <div class="quiz-card text-center">
            <h1>F1 Team Guessing Game</h1>
            
            <div class="score-box">
                Score: <span id="score" class="text-primary">0</span> / <span id="total-questions">4</span>
            </div>

            <!-- Quiz Content Area -->
            <div id="quiz-content">
                <div class="img-container">
                    <img id="carImage" src="mercedes.jpg" alt="F1 Car">
                </div>

                <div class="row g-2 my-3">
                    <div class="col-6">
                        <button class="btn btn-outline-dark w-100 team-btn" onclick="checkAnswer('Mercedes')">Mercedes</button>
                    </div>
                    <div class="col-6">
                        <button class="btn btn-outline-dark w-100 team-btn" onclick="checkAnswer('Ferrari')">Ferrari</button>
                    </div>
                    <div class="col-6">
                        <button class="btn btn-outline-dark w-100 team-btn" onclick="checkAnswer('McLaren')">McLaren</button>
                    </div>
                    <div class="col-6">
                        <button class="btn btn-outline-dark w-100 team-btn" onclick="checkAnswer('Red Bull')">Red Bull</button>
                    </div>
                </div>

                <p id="result" class="my-3"></p>

                <button id="nextBtn" class="btn btn-success px-4 py-2 fw-bold" onclick="nextQuestion()" disabled>Next Question</button>
            </div>

            <!-- End Game Screen Area (Hidden by Default) -->
            <div id="end-screen" style="display: none;">
                <h3 class="mt-4">🏁 Race Finished!</h3>
                <p id="final-comment" class="fs-5 my-3"></p>
                <button class="btn btn-danger btn-lg fw-bold" onclick="restartQuiz()">Restart Game</button>
            </div>
        </div>
    </div>

    <script>
        let score = 0;
        let currentQuestion = 0;
        let answered = false;

        // Note: Make sure these four files exist inside your local images/ folder!
        const cars = [
            { image: "mercedes.jpg", answer: "Mercedes" },
            { image: "ferrari.jpg", answer: "Ferrari" },
            { image: "mclaren.jpg", answer: "McLaren" },
            { image: "redbull.jpg", answer: "Red Bull" }
        ];

        // Initialize total count on screen
        document.getElementById("total-questions").textContent = cars.length;

        function checkAnswer(choice) {
            if (answered) return;
            answered = true;

            const resultElement = document.getElementById("result");
            const nextButton = document.getElementById("nextBtn");

            if (choice === cars[currentQuestion].answer) {
                resultElement.textContent = "✅ Correct!";
                resultElement.className = "text-success my-3";
                score++;
                document.getElementById("score").textContent = score;
            } else {
                resultElement.textContent = "❌ Incorrect! It was " + cars[currentQuestion].answer;
                resultElement.className = "text-danger my-3";
            }

            // Unlock the next button once an answer is locked in
            nextButton.disabled = false;
        }

        function nextQuestion() {
            currentQuestion++;

            // FIX: Stop the endless loop and display an end score summary screen
            if (currentQuestion >= cars.length) {
                showEndScreen();
                return;
            }

            document.getElementById("carImage").src = cars[currentQuestion].image;
            document.getElementById("result").textContent = "";
            answered = false;
            document.getElementById("nextBtn").disabled = true;
        }

        function showEndScreen() {
            document.getElementById("quiz-content").style.display = "none";
            document.getElementById("end-screen").style.display = "block";
            
            const comment = document.getElementById("final-comment");
            if (score === cars.length) {
                comment.textContent = `Perfect score! You got ${score} out of ${cars.length}. You're a true World Champion! 🏆`;
            } else if (score >= 2) {
                comment.textContent = `Good driving! You scored ${score} out of ${cars.length}. Podiums finish! 🏎️`;
            } else {
                comment.textContent = `Box box! You scored ${score} out of ${cars.length}. Time to check the telemetry charts. 🔧`;
            }
        }

        function restartQuiz() {
            score = 0;
            currentQuestion = 0;
            answered = false;
            
            document.getElementById("score").textContent = score;
            document.getElementById("result").textContent = "";
            document.getElementById("carImage").src = cars[0].image;
            document.getElementById("nextBtn").disabled = true;
            
            document.getElementById("end-screen").style.display = "none";
            document.getElementById("quiz-content").style.display = "block";
        }

        window.onload = function () {
            document.getElementById("carImage").src = cars[currentQuestion].image;
        };
    </script>

</body>
</html>
